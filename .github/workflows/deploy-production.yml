name: Legacy QLMED Server Sync

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      - self-hosted
      - qlmed-prod

    steps:
      - name: Notice legacy workflow
        run: |
          echo "Legacy/manual workflow for /home/marce/QLMED/production."
          echo "Public production at https://app.qlmed.com.br is normally deployed by Coolify after pushing main."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production compose
        run: |
          mkdir -p production/env
          : > production/env/app.env
          : > production/env/n8n.env
          docker compose --env-file production/.env.example -f production/docker-compose.yml config >/dev/null

      - name: Sync production manifests
        run: |
          mkdir -p /home/marce/QLMED/production
          cp production/docker-compose.yml /home/marce/QLMED/production/docker-compose.yml

      - name: Sync application source
        run: |
          mkdir -p /home/marce/QLMED/production/app
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude '.next' \
            --exclude 'node_modules' \
            --exclude 'production' \
            ./ /home/marce/QLMED/production/app/

      - name: Stamp deploy metadata
        run: |
          cat > /home/marce/QLMED/production/app/.deploy-meta.env <<EOF
          QLMED_BUILD_COMMIT_SHA=${GITHUB_SHA::12}
          QLMED_BUILD_DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          QLMED_BUILD_SOURCE=github-actions
          EOF

      - name: Deploy stack on server
        run: |
          set -a
          . /home/marce/QLMED/production/app/.deploy-meta.env
          set +a
          docker compose \
            --project-name qlmed \
            --env-file /home/marce/QLMED/production/.env \
            -f /home/marce/QLMED/production/docker-compose.yml \
            up -d --build qlmed-app

      - name: Verify local health
        run: |
          for url in \
            http://127.0.0.1:13000/api/health
          do
            for attempt in $(seq 1 30); do
              if curl -fsS "$url" >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Health check failed for $url" >&2
                exit 1
              fi
              sleep 2
            done
          done

      - name: Verify deployed revision
        run: |
          expected_sha="${GITHUB_SHA::12}"
          for url in \
            http://127.0.0.1:13000/api/health \
            https://app.qlmed.com.br/api/health
          do
            for attempt in $(seq 1 30); do
              body="$(curl -fsS "$url" || true)"
              actual_sha="$(printf '%s' "$body" | sed -n 's/.*"commitSha":"\([^"]*\)".*/\1/p')"
              if [ -n "$actual_sha" ] && [[ "$actual_sha" = "$expected_sha"* || "$expected_sha" = "$actual_sha"* ]]; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Revision check failed for $url: expected $expected_sha, got ${actual_sha:-missing}" >&2
                exit 1
              fi
              sleep 2
            done
          done

      - name: Verify public endpoints
        run: |
          for url in \
            https://app.qlmed.com.br/
          do
            for attempt in $(seq 1 30); do
              if curl -fsSI "$url" >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Public check failed for $url" >&2
                exit 1
              fi
              sleep 2
            done
          done

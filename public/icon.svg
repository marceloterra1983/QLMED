<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <clipPath id="circleClip">
      <circle cx="248" cy="264" r="232"/>
    </clipPath>
  </defs>
  <!-- Blue circle -->
  <circle cx="248" cy="264" r="232" fill="#2952b8"/>
  <!-- Notch cutout at top-right (clipped to circle) -->
  <g clip-path="url(#circleClip)">
    <rect x="268" y="32" width="230" height="175" fill="white"/>
  </g>
  <!-- White "L" letterform -->
  <rect x="148" y="88" width="88" height="310" rx="4" fill="white"/>
  <rect x="148" y="310" width="244" height="88" rx="4" fill="white"/>
</svg>

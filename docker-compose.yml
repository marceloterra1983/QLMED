services:
  qlmed-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: qlmed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qlmed_secret}
      POSTGRES_DB: qlmed
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qlmed']
      interval: 10s
      timeout: 5s
      retries: 5

  qlmed-app:
    build:
      context: .
      args:
        QLMED_API_KEY: ${QLMED_API_KEY:-}
    restart: unless-stopped
    ports:
      - '3001:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://qlmed:${POSTGRES_PASSWORD:-qlmed_secret}@qlmed-db:5432/qlmed?schema=public
    depends_on:
      qlmed-db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - qlmed-app

  n8n:
    image: n8nio/n8n:2.9.2
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - '5678:5678'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - N8N_SECURE_COOKIE=false
      - N8N_EDITOR_BASE_URL=https://n8n2.qlmed.com.br/
      - N8N_TRUST_PROXY=true
      - N8N_PROXY_HOPS=1
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - QLMED_API_URL=http://qlmed-app:3000
      - QLMED_API_KEY=${QLMED_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:
